<div class="care-body">
  @if (showSpinner) {
  <mat-progress-spinner class="spinner" mode="indeterminate">
  </mat-progress-spinner>
  } @else {
  <div class="dashboard-content">
    <care-upcoming-events [events]="events" [eventTypes]="eventTypes" (eventChange)="onNewEvent()"></care-upcoming-events>
    <care-quick-log [eventTypes]="eventTypes" (newEvent)="onNewEvent()"></care-quick-log>
    <care-status-monitor [events]="events" [eventTypes]="eventTypes" (eventChange)="onNewEvent()"></care-status-monitor>
    <care-daily-timeline (eventChange)="onNewEvent()"></care-daily-timeline>
  </div>
  }
</div>

<care-alert></care-alert>
