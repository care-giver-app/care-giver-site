<div class="care-body">
  <care-navbar></care-navbar>
  <care-receiver-selection
    (receiverChange)="onReceiverChange()"
  ></care-receiver-selection>

  @if (showSpinner) {
  <mat-progress-spinner class="spinner" mode="indeterminate">
  </mat-progress-spinner>
  } @else {
  <care-upcoming-events [events]="events" [eventTypes]="eventTypes"></care-upcoming-events>
  <care-status-monitor [events]="events" [eventTypes]="eventTypes" (newEvent)="getLatestEvents()"></care-status-monitor>
  <care-quick-log [eventTypes]="eventTypes" (newEvent)="getLatestEvents()"></care-quick-log>

  <care-calendar
    [events]="events"
    (eventToDelete)="handleDeleteEvent($event)"
    (eventToView)="handleViewEvent($event)"
  ></care-calendar>
  }
</div>

@if (selectedEvent){
<care-event-modal
  [event]="selectedEvent"
  [(eventAction)]="eventAction"
  [(showModal)]="showEventModal"
  (eventChange)="getLatestEvents()"
></care-event-modal>
}

<care-alert></care-alert>
