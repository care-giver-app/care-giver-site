<div class="care-body">
  <lib-care-navbar></lib-care-navbar>
  <lib-care-receiver-selection
    (receiverChange)="onReceiverChange()"
  ></lib-care-receiver-selection>

  @if (showSpinner) {
  <mat-progress-spinner class="spinner" mode="indeterminate">
  </mat-progress-spinner>
  } @else {
  <lib-care-event-table
    [events]="events"
    [eventTypes]="eventTypes"
    (newEvent)="getLatestEvents()"
    (eventToDelete)="handleDeleteEvent($event)"
  ></lib-care-event-table>

  <lib-care-calendar
    [events]="events"
    (eventToDelete)="handleDeleteEvent($event)"
    (eventToView)="handleViewEvent($event)"
  ></lib-care-calendar>
  }
</div>

@if (selectedEvent){
<lib-care-event-modal
  [event]="selectedEvent"
  [(eventAction)]="eventAction"
  [(showModal)]="showEventModal"
  (eventChange)="getLatestEvents()"
></lib-care-event-modal>
}

<lib-care-alert></lib-care-alert>
