<div class="care-body">
  <care-event-table
    [variant]="'all_events'"
    [events]="events"
    [eventTypes]="eventTypes"
    (newEvent)="getLatestEvents()"
    (eventToDelete)="handleDeleteEvent($event)"
  ></care-event-table>
  <care-chart
    [events]="events"
    [eventTypes]="eventTypes"
    [chartType]="'scatter'"
    [chartTitle]="'Event Scatter Chart'"
  ></care-chart>

  @for (eventType of eventTypesWithGraphs; track eventType.type) {
  <care-chart
    [events]="events"
    [chartType]="eventType.graph!.type"
    [eventTypes]="[eventType]"
    [chartTitle]="eventType.graph!.title"
    [unit]="eventType.data?.unit"
  ></care-chart>
  }
</div>

@if (selectedEvent){
<care-event-view-modal
  [event]="selectedEvent"
  [eventTypes]="eventTypes"
  [(show)]="showEventModal"
  (eventChange)="getLatestEvents()"
></care-event-view-modal>
}

<care-alert></care-alert>
