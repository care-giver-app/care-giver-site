<div class="care-body">
  <lib-care-navbar></lib-care-navbar>
  <lib-care-receiver-selection
    (receiverChange)="onReceiverChange()"
  ></lib-care-receiver-selection>

  <lib-care-event-table
    [variant]="'all_events'"
    [events]="events"
    [eventTypes]="eventTypes"
    (newEvent)="getLatestEvents()"
    (eventToDelete)="handleDeleteEvent($event)"
  ></lib-care-event-table>
  <lib-care-chart
    [events]="events"
    [eventTypes]="eventTypes"
    [chartType]="'scatter'"
    [chartTitle]="'Event Scatter Chart'"
  ></lib-care-chart>

  @for (eventType of eventTypesWithGraphs; track eventType.type) {
  <lib-care-chart
    [events]="events"
    [chartType]="eventType.graph!.type"
    [eventTypes]="[eventType]"
    [chartTitle]="eventType.graph!.title"
  ></lib-care-chart>
  }
</div>

@if (selectedEvent){
<lib-care-event-modal
  [event]="selectedEvent"
  [(eventAction)]="eventAction"
  [(showModal)]="showEventModal"
  (eventChange)="getLatestEvents()"
></lib-care-event-modal>
}

<lib-care-alert></lib-care-alert>
