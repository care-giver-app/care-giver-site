@if (show){
<div
  class="modal"
  (click)="onExit()"
  (keyup)="$event.stopPropagation()"
  tabindex="0"
>
  <div
    class="modal-content"
    (click)="$event.stopPropagation()"
    (keyup)="$event.stopPropagation()"
    tabindex="0"
  >
    <div class="modal-header">
      <h3>{{ header }}</h3>
      <button
        class="close-btn"
        (click)="onExit()"
        (keyup)="$event.stopPropagation()"
        tabindex="0"
      >
        &times;
      </button>
    </div>
    <div class="modal-body">
      <ng-content select="[modal-body]"></ng-content>
    </div>
    <div class="modal-footer">
      <ng-content select="[modal-footer]"></ng-content>
    </div>
  </div>
</div>
}
